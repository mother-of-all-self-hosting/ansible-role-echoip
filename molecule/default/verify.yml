---
- name: Verify echoip systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for echoip service to become active (up to 180s)
      ansible.builtin.systemd:
        name: echoip.service
      register: echoip_service
      until: echoip_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert echoip service is active
      ansible.builtin.assert:
        that: echoip_service.status.ActiveState == 'active'
        fail_msg: "echoip.service not active ({{ echoip_service.status.ActiveState }})"
        success_msg: "echoip.service is active"

    - name: Retrieve echoip service log for debugging
      when: echoip_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu echoip.service
      changed_when: false

    - name: Wait for echoip HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8080/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: echoip_endpoint
      until: echoip_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert echoip HTTP endpoint responds
      ansible.builtin.assert:
        that: echoip_endpoint.status in [200, 302]
        fail_msg: "echoip did not respond as expected ({{ echoip_endpoint.status | default('no response') }})"
        success_msg: "echoip responded with {{ echoip_endpoint.status }}"

    - name: Show echoip systemd service status summary
      ansible.builtin.debug:
        msg:
          - "echoip systemd: {{ echoip_service.status.ActiveState }}"
          - "echoip HTTP: {{ echoip_endpoint.status }}"
